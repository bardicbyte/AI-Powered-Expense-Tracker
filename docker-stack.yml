version: '3.8'

services:
  frontend:
    image: yourusername/frontend:latest
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost/api
    networks:
      - app-network
    deploy:
      replicas: 1

  backend:
    image: yourusername/backend:latest
    ports:
      - "80:80"
    environment:
      - INVOICE_PROCESSOR_URL=http://invoice_processor:5001
    networks:
      - app-network
    deploy:
      replicas: 1

  invoice_processor:
    image: yourusername/invoice-processor:latest
    expose:
      - "5001"
    networks:
      - app-network
    deploy:
      replicas: 3

networks:
  app-network:
    driver: overlay